repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --
        language: system
        pass_filenames: false
        types: [rust]

      - id: clippy
        name: clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: ruff-format
        name: ruff-format
        entry: .venv/bin/ruff format --
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-check
        name: ruff-check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]
        pass_filenames: true